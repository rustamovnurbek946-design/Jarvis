// Lucide icon helper — renders an <svg> for a named icon
function Icon({ name, size = 18, color = 'currentColor', strokeWidth = 2 }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    if (ref.current) {
      ref.current.innerHTML = '';
      const el = document.createElement('i');
      el.setAttribute('data-lucide', name);
      ref.current.appendChild(el);
      window.lucide.createIcons({
        attrs: { width: size, height: size, stroke: color, 'stroke-width': strokeWidth },
        icons: window.lucide.icons,
      });
    }
  }, [name, size, color, strokeWidth]);
  return <span ref={ref} style={{ display: 'inline-flex', width: size, height: size }} />;
}

function NewGoalModal({ onClose, onSave, goal }) {

  const submit = () => {
    if (!title.trim()) { setErr(true); return; }
    const p = Math.max(0, Math.min(100, parseInt(progress, 10) || 0));
    onSave({
      title: title.trim(),
      desc: desc.trim() || 'Tavsif kiritilmagan.',

    <div style={{

    }} onClick={onClose}>

}

const TODAY = '2026-07-03';
const UZ_MONTHS = ['yanvar','fevral','mart','aprel','may','iyun','iyul','avgust','sentabr','oktabr','noyabr','dekabr'];

function addDays(iso, n) {
  const d = new Date(iso + 'T00:00');
  d.setDate(d.getDate() + n);
  return d.toISOString().slice(0, 10);
}
function whenOf(date) { return date <= TODAY ? 'today' : 'upcoming'; }
function formatDue(date, time) {
  let day;
  if (date === TODAY) day = 'Bugun';
  else if (date === addDays(TODAY, 1)) day = 'Ertaga';
  else {
    const d = new Date(date + 'T00:00');
    day = d.getDate() + '-' + UZ_MONTHS[d.getMonth()];
  }
  return time ? day + ', ' + time : day;
}

}

            <button onClick={onClose} aria-label="Yopish" style={{ border: 'none', background: 'transparent', cursor: 'pointer', color: 'var(--color-text-muted)', display: 'flex', padding: 4, borderRadius: 6 }}>
              <Icon name="x" size={20} />
            </button>
          </div>

          <div style={{ display: 'flex', flexDirection: 'column', gap: 16, marginBottom: 24 }}>
            <Input label="Vazifa nomi" placeholder="Masalan: 20 ta so'z yodlash" value={title}

              <Input label="Bog'langan maqsad" placeholder="Masalan: Ingliz tili B2" value={goal} onChange={setGoal} />
            </div>

            <div style={{ display: 'flex', gap: 12 }}>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 11, fontWeight: 600, color: 'var(--color-text-muted)', letterSpacing: '0.06em', textTransform: 'uppercase', marginBottom: 8 }}>Sana</div>
                <input type="date" value={date} onChange={(e) => setDate(e.target.value)} style={dtInput} />
              </div>
              <div style={{ width: 150 }}>
                <div style={{ fontSize: 11, fontWeight: 600, color: 'var(--color-text-muted)', letterSpacing: '0.06em', textTransform: 'uppercase', marginBottom: 8 }}>Soat</div>
                <input type="time" value={time} onChange={(e) => setTime(e.target.value)} style={dtInput} />
              </div>
            </div>

            <div>
              <div style={{ fontSize: 11, fontWeight: 600, color: 'var(--color-text-muted)', letterSpacing: '0.06em', textTransform: 'uppercase', marginBottom: 8 }}>Muhimlik</div>
              <div style={{ display: 'flex', gap: 8 }}>
                {pseg('high')}
                {pseg('mid')}
                {pseg('low')}
              </div>
            </div>
          </div>

          <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end' }}>
            <Button variant="ghost" onClick={onClose}>Bekor qilish</Button>
            <Button variant="primary" onClick={submit}>Saqlash</Button>
          </div>
        </Card>
      </div>
    </div>
  );
}

function TasksPage() {
  const [tasks, setTasks] = React.useState(TASKS);
  const [modal, setModal] = React.useState(null); // null | 'new' | task object
  const toggle = (id) => setTasks(prev => prev.map(t => t.id === id ? { ...t, done: !t.done } : t));
  const addTask = (t) => setTasks(prev => [{ id: Date.now(), done: false, ...t }, ...prev]);
  const updateTask = (id, t) => setTasks(prev => prev.map(x => x.id === id ? { ...x, ...t } : x));
  const deleteTask = (id) => setTasks(prev => prev.filter(x => x.id !== id));
  const byTime = (a, b) => (a.date + a.time).localeCompare(b.date + b.time);
  const today = tasks.filter(t => whenOf(t.date) === 'today').sort(byTime);
  const upcoming = tasks.filter(t => whenOf(t.date) === 'upcoming').sort(byTime);
  const openCount = tasks.filter(t => !t.done).length;

  return (
    <React.Fragment>
      <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', gap: 16, marginBottom: 28 }}>
        <div>
          <h1 style={{ fontSize: 26, fontWeight: 700, color: 'var(--color-text)', letterSpacing: '-0.02em', marginBottom: 4 }}>Vazifalar</h1>
          <div style={{ fontSize: 14, color: 'var(--color-text-muted)' }}>{openCount} ta bajarilishi kerak</div>
        </div>
        <Button variant="primary" size="md" onClick={() => setModal('new')}>+ Yangi vazifa</Button>
      </div>

      <div style={{ maxWidth: 720 }}>
        <TaskSection title="Bugun" count={today.length} tasks={today} onToggle={toggle} onEdit={setModal} onDelete={deleteTask} />
        <TaskSection title="Kelgusi" count={upcoming.length} tasks={upcoming} onToggle={toggle} onEdit={setModal} onDelete={deleteTask} />
      </div>

      {modal && (
        <NewTaskModal
          onClose={() => setModal(null)}
          task={modal === 'new' ? null : modal}
          onSave={(t) => modal === 'new' ? addTask(t) : updateTask(modal.id, t)}
        />
      )}
    </React.Fragment>
  );
}

function App() {
  const [active, setActive] = React.useState('maqsadlar');
  const [goals, setGoals] = React.useState(GOALS);

  const addGoal = (g) => setGoals(prev => [{ id: Date.now(), ...g }, ...prev]);
  const updateGoal = (id, g) => setGoals(prev => prev.map(x => x.id === id ? { ...x, ...g } : x));
  const deleteGoal = (id) => setGoals(prev => prev.filter(x => x.id !== id));

  let content;
  if (active === 'maqsadlar') content = <GoalsPage goals={goals} onAdd={addGoal} onUpdate={updateGoal} onDelete={deleteGoal} />;
  else if (active === 'vazifalar') content = <TasksPage />;
  else if (active === 'ai') content = <AIPage />;
  else content = <DayAnalysisPage />;

  return (
    <div style={{ display: 'flex', height: '100vh', overflow: 'hidden' }}>
      <Sidebar active={active} setActive={setActive} />
      <div style={{ flex: 1, overflow: 'auto', padding: '36px 40px' }}>
        {content}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
