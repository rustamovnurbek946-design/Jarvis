<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Jarvis — Sprint Dashboard</title>
<style>
  :root{
    --bg:#0b0f1a; --bg2:#111726; --card:#141b2d; --card2:#1a2237;
    --border:#22304d; --text:#e7ecf5; --muted:#8a96ad; --muted2:#5f6b82;
    --accent:#6d8cff; --accent2:#9a7bff;
    --done:#37d399; --partial:#f5b83f; --todo:#5f6b82; --danger:#ff6b6b;
    --ring: rgba(109,140,255,.35);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:radial-gradient(1200px 600px at 80% -10%, rgba(109,140,255,.12), transparent 60%),
               radial-gradient(1000px 500px at -10% 10%, rgba(154,123,255,.10), transparent 55%),
               var(--bg);
    color:var(--text);
    font-family:"Segoe UI",system-ui,-apple-system,Roboto,Arial,sans-serif;
    line-height:1.55; min-height:100vh;
  }
  .wrap{max-width:1080px;margin:0 auto;padding:40px 22px 80px}
  header.top{display:flex;align-items:center;justify-content:space-between;gap:18px;flex-wrap:wrap;margin-bottom:8px}
  .brand{display:flex;align-items:center;gap:14px}
  .logo{
    width:52px;height:52px;border-radius:14px;flex:none;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:grid;place-items:center;font-size:26px;font-weight:800;color:#0b0f1a;
    box-shadow:0 8px 30px rgba(109,140,255,.4)
  }
  h1{font-size:26px;margin:0;letter-spacing:.2px}
  .sub{color:var(--muted);font-size:14px;margin-top:2px}
  .updated{color:var(--muted2);font-size:12.5px;text-align:right}

  .overview{
    display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:26px 0 10px
  }
  .stat{
    background:linear-gradient(180deg,var(--card),var(--bg2));
    border:1px solid var(--border);border-radius:16px;padding:16px 18px
  }
  .stat .num{font-size:30px;font-weight:800;line-height:1}
  .stat .lbl{color:var(--muted);font-size:12.5px;margin-top:6px}

  .bigbar{margin:18px 0 34px}
  .bigbar .track{height:12px;border-radius:20px;background:#1b2338;border:1px solid var(--border);overflow:hidden}
  .bigbar .fill{height:100%;border-radius:20px;background:linear-gradient(90deg,var(--accent),var(--accent2))}
  .bigbar .cap{display:flex;justify-content:space-between;margin-top:8px;color:var(--muted);font-size:13px}

  .sprint{
    background:linear-gradient(180deg,var(--card),var(--bg2));
    border:1px solid var(--border);border-radius:18px;padding:20px 22px;margin-bottom:16px;
    transition:.2s border-color, .2s transform
  }
  .sprint:hover{border-color:var(--ring);transform:translateY(-1px)}
  .shead{display:flex;align-items:flex-start;gap:16px;cursor:pointer}
  .idx{
    width:44px;height:44px;flex:none;border-radius:12px;display:grid;place-items:center;
    font-weight:800;font-size:18px;background:#1c2540;color:var(--accent);border:1px solid var(--border)
  }
  .stitle{flex:1;min-width:0}
  .stitle h2{margin:0;font-size:18px}
  .stitle p{margin:5px 0 0;color:var(--muted);font-size:13.6px}
  .status{
    flex:none;font-size:12px;font-weight:700;padding:6px 12px;border-radius:999px;white-space:nowrap;
    border:1px solid transparent
  }
  .st-done{background:rgba(55,211,153,.14);color:var(--done);border-color:rgba(55,211,153,.3)}
  .st-progress{background:rgba(109,140,255,.14);color:var(--accent);border-color:rgba(109,140,255,.3)}
  .st-partial{background:rgba(245,184,63,.14);color:var(--partial);border-color:rgba(245,184,63,.3)}
  .st-todo{background:rgba(138,150,173,.12);color:var(--muted);border-color:rgba(138,150,173,.25)}

  .prog{margin-top:16px;display:flex;align-items:center;gap:12px}
  .prog .track{flex:1;height:8px;border-radius:20px;background:#1b2338;border:1px solid var(--border);overflow:hidden}
  .prog .fill{height:100%;border-radius:20px}
  .prog .pct{font-size:12.5px;color:var(--muted);width:78px;text-align:right}

  .tasks{margin-top:16px;border-top:1px dashed var(--border);padding-top:14px;display:none}
  .sprint.open .tasks{display:block}
  .tgroup{font-size:12px;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:.6px;margin:12px 0 6px}
  .t{display:flex;align-items:flex-start;gap:10px;padding:4px 0;font-size:13.8px}
  .box{width:17px;height:17px;flex:none;border-radius:5px;margin-top:2px;display:grid;place-items:center;font-size:11px;font-weight:800;border:1px solid var(--border)}
  .b-x{background:var(--done);color:#06231a;border-color:transparent}
  .b-p{background:var(--partial);color:#3a2a05;border-color:transparent}
  .b-o{background:transparent;color:transparent}
  .t.x span{color:var(--muted)}
  .t.p span{color:var(--text)}
  .hint{color:var(--muted2);font-size:12.5px;margin-top:2px}
  .chev{color:var(--muted2);font-size:13px;margin-top:2px;transition:.2s transform}
  .sprint.open .chev{transform:rotate(180deg)}

  .legend{display:flex;gap:16px;flex-wrap:wrap;margin:24px 2px 0;color:var(--muted);font-size:12.5px}
  .legend span{display:inline-flex;align-items:center;gap:7px}
  .dot{width:10px;height:10px;border-radius:3px;display:inline-block}
  footer{color:var(--muted2);font-size:12.5px;margin-top:34px;text-align:center}
  a{color:var(--accent);text-decoration:none}
  @media(max-width:720px){.overview{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="brand">
      <div class="logo">J</div>
      <div>
        <h1>Jarvis — Sprint Dashboard</h1>
        <div class="sub">Shaxsiy AI assistent · loyiha holati</div>
      </div>
    </div>
    <div class="updated" id="updated"></div>
  </header>

  <section class="overview" id="stats"></section>

  <div class="bigbar">
    <div class="track"><div class="fill" id="bigfill" style="width:0%"></div></div>
    <div class="cap"><span>Umumiy progress</span><span id="bigpct">0%</span></div>
  </div>

  <section id="sprints"></section>

  <div class="legend">
    <span><i class="dot" style="background:var(--done)"></i> Bajarilgan</span>
    <span><i class="dot" style="background:var(--accent)"></i> Jarayonda</span>
    <span><i class="dot" style="background:var(--partial)"></i> Qisman (skelet bor)</span>
    <span><i class="dot" style="background:var(--todo)"></i> Rejalashtirilgan</span>
  </div>

  <footer>
    Batafsil: <code>sprints/</code> papkasidagi fayllar · PRD: <code>.claude/plans/</code>
  </footer>
</div>

<script>
// status: done | progress | partial | todo ; task state: x | p | o
const SPRINTS = [
  {
    n:1, title:"Ekran dizaynlari", status:"progress",
    desc:"Dizayn tizimi va 6 ekran maketi (login, dashboard, goals, day, calendar, settings). Zamonaviy minimalist, mobil-birinchi, och/qorong'i rejim.",
    groups:[
      {g:"Dizayn tizimi", items:[
        ["p","Rang palitrasi (faqat och rejim, dark yo'q)"],
        ["x","Tipografiya va spacing shkalasi"],
        ["p","Komponent inventari (6/14: Button/Card/Input/Progress/StatusTag/Textarea)"],
        ["o","Holat dizaynlari: empty / loading / error"],
        ["o","Til almashtirgich va tema toggle"],
      ]},
      {g:"Navigatsiya", items:[
        ["x","Desktop sidebar: real foydalanuvchi + chiqish tugmasi, 5 bo'lim"],
        ["x","Mobil pastki navigatsiya (bottom-nav), sidebar md:flex bilan desktopga cheklandi"],
        ["p","App shell bor, yuqori header (til/tema) yo'q"],
      ]},
      {g:"Ekran maketlari", items:[
        ["p","Login: funksional /login sahifasi bor (Telegram + Mini App auto-login), dizayn maketidan emas"],
        ["o","Dashboard (yagona ekran o'rniga 4ta sahifaga bo'lindi)"],
        ["p","Maqsadlar (ro'yxat+forma bor, guruhlash/soha/tur yo'q)"],
        ["p","Kunim (/day hozircha faqat statik mock ko'rinish)"],
        ["o","Kalendar (haftalik)"],
        ["o","Sozlamalar"],
      ]},
      {g:"Yakuniy tayyorgarlik", items:[
        ["p","Maqsadlar/Vazifalar/AI/Kun + app shell responsive (375px'da toshib ketish yo'q); Dashboard/Kalendar/Sozlamalar hali yo'q"],
      ]},
    ]
  },
  {
    n:2, title:"MVP (dizayn bo'yicha)", status:"progress",
    desc:"Ishlaydigan yadro: Telegram/Google login, maqsad kiritish, kun yozish, Gemini bilan kunni tahlil qilib ertangi rejani yaratish. Calendar/Cron'siz.",
    groups:[
      {g:"Karkas", items:[
        ["x","Next.js 16 + TS + Tailwind (create-next-app)"],
        ["x","Dizayn tokenlari Tailwind/CSS'ga ulandi"],
        ["p","next-intl skelet (uz/ru/en), layout'ga ulanmagan"],
        ["o","shadcn/ui init (qaror: qo'lda komponent yozildi)"],
        ["o","Och/qorong'i rejim"],
        ["x","dev-deps o'rnatilishi (drizzle-kit, dotenv, tsx)"],
      ]},
      {g:"Baza, Auth va Telegram login", items:[
        ["x","Neon baza ulandi + migratsiyalar (0000/0001/0002) qo'llandi"],
        ["x","Drizzle sxema: telegramLoginTokens + users.telegramUsername/knowledgeBase/agentInstructions qo'shildi"],
        ["x","auth.ts: Google (faqat Calendar) + Telegram Credentials provider, JWT sessiya — 8/8 skript bilan tasdiqlangan"],
        ["o","Google Cloud OAuth client + ALLOWED_EMAILS (Calendar hali ulanmagan)"],
        ["p",".env kalitlar: Telegram/AUTH/GEMINI bor, Google kalitlar yo'q"],
        ["x","/login (Telegram deep-link) + himoyalangan layout — demo-user butunlay olib tashlandi"],
        ["x","Chiqish (sign out) tugmasi ishlaydi"],
      ]},
      {g:"Funksiyalar", items:[
        ["x","Maqsadlar CRUD real bazada, endi real auth() sessiyasi orqali"],
        ["p","Maqsad formasi/guruhlash to'liq emas, bo'sh holat yo'q"],
        ["o","Vazifalar (/tasks) hali mock/local state, DB'ga ulanmagan"],
        ["o","Kunim /day (kun kiritish, saqlash)"],
        ["p","AI modul (Gemini) skelet, hali chaqirilmagan"],
        ["o","'Reja generatsiya' tugmasi (E2E)"],
      ]},
      {g:"Bilim bazasi (yangi)", items:[
        ["x","/knowledge sahifasi: bilim bazasi + agent instruksiyalari textarea'lari"],
        ["x","lib/actions/profile.ts server action'lar"],
        ["x","Telegram AI chat shu ma'lumotdan foydalanadi (lib/ai/chat.ts)"],
      ]},
    ]
  },
  {
    n:3, title:"Calendar + Telegram + Cron", status:"progress",
    desc:"Google Calendar ikki tomonlama sinxron, to'liq interaktiv Telegram bot (Gemini AI chat bilan) va avtomatlashtirish (kechki so'rov, kechki generatsiya, haftalik xulosa).",
    groups:[
      {g:"Google Calendar", items:[
        ["p","calendar.ts (token, freebusy, event) skelet"],
        ["x","Auth.js scope'ida calendar.events + calendar.readonly tasdiqlangan"],
        ["o","refresh_token oqimi test"],
        ["o","Bandliklarni o'qib rejaga ulash"],
        ["o","Time-block tasklarni Calendar'ga yozish"],
        ["o","/calendar sahifasi"],
      ]},
      {g:"Telegram bot", items:[
        ["x","bot.ts qayta yozildi: /start login_<token> deep-link, allowlist, /today, /plan, inline done"],
        ["x","3 tilda bot matnlari (login, /kun, chat xatosi) yangilandi"],
        ["x","BotFather orqali haqiqiy bot (@jarvisdreams_bot) + TELEGRAM_BOT_TOKEN"],
        ["p","webhook route bor, lekin production'da hali setWebhook qilinmagan (lokal: dev-bot.ts polling)"],
        ["x","Hisob bog'lash: eski link-kod o'rniga /login deep-link oqimi (auth bilan bir xil)"],
        ["p","/kun buyrug'i (kundalik) — kod tayyor, real Telegramda test qilinmagan"],
        ["x","AI chat: erkin matn → Gemini (lib/ai/chat.ts), bilim bazasi/instruksiyalar skript orqali tasdiqlangan"],
        ["o","/today, /plan — real Telegramda E2E test"],
      ]},
      {g:"Telegram Mini App (yangi)", items:[
        ["x","Root layout Telegram WebApp SDK yuklaydi (ready/expand/setHeaderColor/disableVerticalSwipes)"],
        ["x","initData HMAC-SHA256 tasdiqlash (verify-init-data.ts) + Credentials(\"telegram-miniapp\") auto-login"],
        ["x","/app buyrug'i + scripts/set-menu-button.ts — botning doimiy menyu tugmasi"],
        ["x","Mini App kirish nuqtasi /login'ga to'g'ridan-to'g'ri yo'naltirildi (real qurilmada topilgan xato tuzatildi)"],
        ["o","Haqiqiy Telegram qurilmasida to'liq E2E tekshiruv"],
      ]},
      {g:"Avtomatlashtirish", items:[
        ["p","evening / nightly / weekly cron route'lari"],
        ["p","weeklySummary + CRON_SECRET guard"],
        ["p","vercel.json cron jadvali"],
        ["o","Cron'larni qo'lda test"],
      ]},
    ]
  },
  {
    n:4, title:"Testlash va prodga chiqarish", status:"partial",
    desc:"E2E test, sayqallash (empty/loading/xato holatlar, statistika grafiklari), Vercelga deploy, webhook va cron'ni prod'da faollashtirish.",
    groups:[
      {g:"Sifat", items:[
        ["o","E2E qo'lda test (3 til)"],
        ["o","Ikki foydalanuvchi izolyatsiyasi"],
        ["o","Birlik testlar (date, sxema)"],
        ["o","Chet holatlar va xato boshqaruvi"],
      ]},
      {g:"Sayqallash", items:[
        ["o","Empty / loading / toast"],
        ["p","Mobil (brauzer preview'da tekshirilgan) + dark mode tekshiruv (dark hali yo'q)"],
        ["o","Statistika grafiklari"],
      ]},
      {g:"Deploy", items:[
        ["o","GitHub + Vercel ulash"],
        ["o","Env o'zgaruvchilari (prod)"],
        ["o","Production deploy"],
        ["o","Telegram webhook + cron (prod)"],
        ["o","2 foydalanuvchini kiritish va sinov"],
      ]},
    ]
  },
];

const STATUS_LABEL = {done:"Bajarilgan",progress:"Jarayonda",partial:"Qisman",todo:"Rejalashtirilgan"};
const STATUS_CLASS = {done:"st-done",progress:"st-progress",partial:"st-partial",todo:"st-todo"};
const FILL = {done:"var(--done)",progress:"linear-gradient(90deg,var(--accent),var(--accent2))",partial:"var(--partial)",todo:"var(--todo)"};

function pct(sp){
  let total=0, score=0;
  sp.groups.forEach(gr=>gr.items.forEach(([st])=>{ total++; score += st==="x"?1:(st==="p"?0.4:0); }));
  return total? Math.round(score/total*100):0;
}

const sprintsEl = document.getElementById('sprints');
let sumScore=0, sumTotal=0, doneSprints=0;

SPRINTS.forEach(sp=>{
  const p = pct(sp);
  sp.groups.forEach(gr=>gr.items.forEach(([st])=>{ sumTotal++; sumScore += st==="x"?1:(st==="p"?0.4:0); }));
  if(sp.status==="done") doneSprints++;

  const el = document.createElement('div');
  el.className='sprint';
  el.innerHTML = `
    <div class="shead">
      <div class="idx">${sp.n}</div>
      <div class="stitle">
        <h2>Sprint ${sp.n}: ${sp.title}</h2>
        <p>${sp.desc}</p>
      </div>
      <div class="status ${STATUS_CLASS[sp.status]}">${STATUS_LABEL[sp.status]}</div>
      <div class="chev">▼</div>
    </div>
    <div class="prog">
      <div class="track"><div class="fill" style="width:${p}%;background:${FILL[sp.status]}"></div></div>
      <div class="pct">${p}% tayyor</div>
    </div>
    <div class="tasks">
      ${sp.groups.map(gr=>`
        <div class="tgroup">${gr.g}</div>
        ${gr.items.map(([st,txt])=>`
          <div class="t ${st}">
            <div class="box ${st==='x'?'b-x':st==='p'?'b-p':'b-o'}">${st==='x'?'✓':st==='p'?'~':''}</div>
            <span>${txt}</span>
          </div>`).join('')}
      `).join('')}
    </div>`;
  el.querySelector('.shead').addEventListener('click',()=>el.classList.toggle('open'));
  sprintsEl.appendChild(el);
});

// open the first in-progress/partial sprint by default
const firstActive = [...sprintsEl.children].find((_,i)=>['progress','partial'].includes(SPRINTS[i].status));
if(firstActive) firstActive.classList.add('open');

const overall = sumTotal? Math.round(sumScore/sumTotal*100):0;
document.getElementById('bigfill').style.width = overall+'%';
document.getElementById('bigpct').textContent = overall+'%';

const stats = [
  ['4','Sprintlar'],
  [doneSprints+'/4','Tugallangan sprint'],
  [overall+'%','Umumiy progress'],
  [SPRINTS.filter(s=>s.status!=='todo').length+'/4','Boshlangan'],
];
document.getElementById('stats').innerHTML = stats.map(([n,l])=>`
  <div class="stat"><div class="num">${n}</div><div class="lbl">${l}</div></div>`).join('');

document.getElementById('updated').innerHTML =
  'Yangilangan: '+new Date().toLocaleDateString('uz-UZ',{year:'numeric',month:'long',day:'numeric'})+
  '<br>Kartani bosib tafsilotini oching';
</script>
</body>
</html>
